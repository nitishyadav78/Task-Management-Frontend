<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">{{ isEditMode ? 'Edit Task' : 'Add New Task' }}</h4>
    </div>
    <div class="card-body">
        <form (ngSubmit)="saveTask()">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" [(ngModel)]="task.title" name="title" required
                    placeholder="Kya kaam karna hai?">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" [(ngModel)]="task.description" name="description" rows="3"
                    placeholder="Thoda detail mein bataiye..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" [(ngModel)]="task.status" name="status">
                    <option value="TODO">To Do</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="DONE">Done</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    {{ isEditMode ? 'Update Task' : 'Save Task' }}
                </button>
                <button type="button" class="btn btn-secondary" routerLink="/tasks">Cancel</button>
            </div>
        </form>
    </div>
</div>
